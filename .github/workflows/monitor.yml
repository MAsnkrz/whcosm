name: Wholesale Cosmetics Monitor

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wholesale-cosmetics-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15   # reduced — no Playwright so much faster

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4   # no playwright needed

      - name: Run monitor
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          RUN_ONCE: "true"
        run: python wholesale_cosmetics_monitor.py

      - name: Commit updated snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add snapshot_wholesalecosmetics.json baseline_done_wholesalecosmetics.txt 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update snapshot [skip ci]"
          git push origin HEAD:main
